# Public mirror CI -- shipped to the public `diaspore` repo as `.gitea/workflows/ci.yml` by
# ci/publish-source.sh (this file is NOT itself published at this path). Fast, source-only checks on the
# clean public snapshot: the agent (Go) builds + tests, and shell scripts parse. The heavy OS image build
# is not here -- it needs a synced LineageOS tree and signing keys on a build host (see CONTRIBUTING.md).
#
# Triggers are push + manual only, deliberately NOT pull_request: the org's act_runner is host mode on the
# build VM (which holds signing keys), so we do not auto-run untrusted fork PRs on it. External-contributor
# PR validation awaits an isolated runner.
name: CI
on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

env:
  GOTOOLCHAIN: auto   # core/agent/go.mod may pin a newer Go than the runner ships; auto-fetch it

jobs:
  checks:
    name: Agent (vet/test/build) + script syntax
    runs-on: host
    steps:
      - name: Check out the pushed commit
        # Host-mode runner has no node, so JS actions (actions/checkout) can't run. Fetch the ref manually
        # with the job token; keep the token in an auth header, not the URL.
        run: |
          set -e
          rm -rf "${GITHUB_WORKSPACE:?}"/* "${GITHUB_WORKSPACE:?}"/.git 2>/dev/null || true
          cd "$GITHUB_WORKSPACE"
          git init -q .
          git -c http.extraHeader="Authorization: token ${{ github.token }}" \
              fetch -q --depth 1 "${{ github.server_url }}/${{ github.repository }}.git" "${{ github.ref }}"
          git checkout -q FETCH_HEAD

      - name: Agent vet + test + arm64 build
        run: |
          set -e
          export PATH="$HOME/bin:/usr/local/go/bin:$PATH"
          cd "$GITHUB_WORKSPACE/core/agent"
          go version
          go vet ./...
          go test ./...
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o /tmp/diaspore_agent_ci .
          echo "arm64 build OK: $(file /tmp/diaspore_agent_ci | cut -d, -f1-2)"

      - name: Shell script syntax
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          n=0
          # Check each script with the interpreter matching its shebang: the Android system scripts are
          # POSIX sh (#!/system/bin/sh), the build tooling is bash (arrays etc.) -- sh -n on a bash script
          # would wrongly reject valid syntax.
          for f in $(git ls-files '*.sh'); do
            case "$(head -1 "$f")" in
              *bash*) bash -n "$f" ;;
              *)      sh -n "$f" ;;
            esac
            n=$((n+1))
          done
          echo "syntax-checked $n scripts"
